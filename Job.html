<!DOCTYPE html>
<html>
<head>
    <title>Job Application Form</title>
</head>
<body>

    <h1>Job Application Form</h1>
    <p>Please fill out the form below to apply for the job.</p>

    <form>

        <!-- Personal Information -->
        <h3>Personal Information</h3>

        <label>Full Name:</label><br>
        <input type="text"><br><br>

        <label>Email Address:</label><br>
        <input type="email"><br><br>

        <label>Phone Number:</label><br>
        <input type="text"><br><br>

        <!-- Resume Upload -->
        <h3>Resume</h3>

        <label>Upload Resume:</label><br>
        <input type="file"><br><br>

        <!-- Cover Letter -->
        <h3>Cover Letter</h3>

        <label>Write your cover letter:</label><br>
        <textarea rows="6" cols="40"></textarea><br><br>

        <!-- References -->
        <h3>References</h3>

        <label>Reference Name:</label><br>
        <input type="text"><br><br>

        <label>Reference Contact:</label><br>
        <input type="text"><br><br>

        <!-- Submit -->
        <input type="submit" value="Apply Now">

    </form>
<a href="http://127.0.0.1:5500/Resume.html">Resume</a>
</body>
</html>
